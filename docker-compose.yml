version: "3.9"

services:
  traefik:
    image: traefik:v2.11          # downgrade from v3.0
    environment:
      - DOCKER_API_VERSION=1.54
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=app_network"
      - "--entrypoints.web.address=:80"
    ports:
      - "8081:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app_network

  django:
    build: .
    command: uv run gunicorn backend.wsgi:application --bind 0.0.0.0:8000
    depends_on:
      - db
    environment:
      - POSTGRES_DB=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.django.entrypoints=web"
      - "traefik.http.routers.django.rule=PathPrefix(`/`)"
      - "traefik.http.services.django.loadbalancer.server.port=8000"
    networks:
      - app_network

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge